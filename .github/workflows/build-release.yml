name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Intel / x86-64 ──────────────────────────────────────────────
          - name: "Windows x64"
            os: windows-latest
            artifact_name: blast-dbf-windows-x64.exe
            cross: false

          - name: "Linux x64"
            os: ubuntu-latest
            artifact_name: blast-dbf-linux-x64
            cross: false

          - name: "macOS x64"
            os: macos-13
            artifact_name: blast-dbf-macos-x64
            cross: false

          # ── ARM / aarch64 ───────────────────────────────────────────────
          - name: "macOS ARM64"
            os: macos-latest
            artifact_name: blast-dbf-macos-arm64
            cross: false
            cflags: "-arch arm64"

          - name: "Linux ARM64"
            os: ubuntu-latest
            artifact_name: blast-dbf-linux-arm64
            cross: true
            cc: aarch64-linux-gnu-gcc
            apt_pkg: gcc-aarch64-linux-gnu

          - name: "Windows ARM64"
            os: windows-11-arm
            artifact_name: blast-dbf-windows-arm64.exe
            cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Dependências nativas ─────────────────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw

      - name: Install dependencies (Linux native)
        if: runner.os == 'Linux' && matrix.cross == false
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          command -v make || brew install make

      # ── Cross-compilação (Linux → Linux ARM64) ───────────────────────────
      - name: Install cross-compiler
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make ${{ matrix.apt_pkg }}

      - name: Build (native)
        if: matrix.cross == false
        run: make ${{ matrix.cflags && format('CFLAGS="{0}"', matrix.cflags) || '' }}

      - name: Build (cross)
        if: matrix.cross == true
        run: make CC=${{ matrix.cc }}

      # ── Testes ───────────────────────────────────────────────────────────
      - name: Test
        if: matrix.cross == false && runner.os != 'Windows'
        run: make test

      # ── Upload do artefato ───────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            blast-dbf
            blast-dbf.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create and upload release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes || true
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes ""
          gh release upload ${{ github.ref_name }} artifacts/**/*
