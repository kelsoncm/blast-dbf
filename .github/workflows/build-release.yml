name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows x64"
            os: windows-latest
            artifact_name: blast-dbf-windows-x64.exe
            windows: true

          - name: "Windows ARM64"
            os: windows-11-arm
            artifact_name: blast-dbf-windows-arm64.exe
            windows: true

          - name: "Linux x64"
            os: ubuntu-latest
            artifact_name: blast-dbf-linux-x64
            windows: false

          - name: "Linux ARM64"
            os: ubuntu-24.04-arm
            artifact_name: blast-dbf-linux-arm64
            windows: false

          - name: "macOS ARM64"
            os: macos-latest
            artifact_name: blast-dbf-macos-arm64
            windows: false
            cflags: -arch arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: command -v make || brew install make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: make clean && make

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows' && matrix.name != 'macOS ARM64'
        run: make clean && make

      - name: Build (macOS ARM64)
        if: matrix.name == 'macOS ARM64'
        run: make clean && make CC=clang CFLAGS="${{ matrix.cflags }}"

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rm -f out.dbf
          ./blast-dbf.exe sids.dbc out.dbf
          cmp out.dbf sids.dbf

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: make test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            blast-dbf
            blast-dbf.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes || true
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes ""

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f -maxdepth 2 -print0 | xargs -0 -I {} gh release upload ${{ github.ref_name }} "{}" --clobber
