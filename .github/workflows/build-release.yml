name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows x64"
            os: windows-latest
            artifact_name: blast-dbf-windows-x64.exe

          - name: "Windows ARM64"
            os: windows-11-arm
            artifact_name: blast-dbf-windows-arm64.exe

          - name: "Linux x64"
            os: ubuntu-latest
            artifact_name: blast-dbf-linux-x64

          - name: "Linux ARM64"
            os: ubuntu-24.04-arm
            artifact_name: blast-dbf-linux-arm64

          - name: "macOS ARM64"
            os: macos-latest
            artifact_name: blast-dbf-macos-arm64
            cflags: -arch arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: command -v make || brew install make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: make clean && make

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows' && matrix.name != 'macOS ARM64'
        run: make clean && make

      - name: Build (macOS ARM64)
        if: matrix.name == 'macOS ARM64'
        run: make clean && make CC=clang CFLAGS="${{ matrix.cflags }}"

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rm -f out.dbf
          ./blast-dbf.exe sids.dbc out.dbf
          cmp out.dbf sids.dbf

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: make test

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv blast-dbf.exe "${{ matrix.artifact_name }}"

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv blast-dbf "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          path: ${{ matrix.artifact_name }}
          compression-level: 0

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -maxdepth 2 -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/*/*
          fail_on_unmatched_files: true
          generate_release_notes: false
